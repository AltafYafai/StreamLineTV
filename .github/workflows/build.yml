name: Android CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for accurate changelogs
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Build
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          ./gradlew assembleDebug --parallel --configure-on-demand
        else
          ./gradlew lintDebug testDebugUnitTest assembleDebug --parallel --configure-on-demand
        fi

    - name: Prepare Artifact
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_NAME=${{ github.ref_name }}
        cp app/build/outputs/apk/debug/app-debug.apk StreamLineTV_${TAG_NAME}.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: StreamLineTV_${{ github.ref_name }}.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: Send Telegram Notification
      if: success() && startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_NAME=${{ github.ref_name }}
        REPO_NAME=${{ github.repository }}
        RELEASE_URL="https://github.com/${REPO_NAME}/releases/tag/${TAG_NAME}"
        MESSAGE="🚀 *New Release:* ${REPO_NAME} ${TAG_NAME}%0A%0A📦 [Download StreamLineTV_${TAG_NAME}.apk](${RELEASE_URL})"
        
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=Markdown"
