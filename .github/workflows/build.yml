name: Android CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Build (Fast Mode)
      # Combined tasks in a single job to avoid setup overhead. 
      # Skips lint/tests on tags for maximum speed if you want, 
      # but here we run them in parallel with the build for safety.
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          ./gradlew assembleDebug --parallel --configure-on-demand
        else
          ./gradlew lintDebug testDebugUnitTest assembleDebug --parallel --configure-on-demand
        fi

    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: |
          app/build/reports/
          app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: Send Telegram Notification
      if: success() && startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_NAME=${{ github.ref_name }}
        REPO_NAME=${{ github.repository }}
        RELEASE_URL="https://github.com/${REPO_NAME}/releases/tag/${TAG_NAME}"
        MESSAGE="🚀 *Fast Release:* ${REPO_NAME} ${TAG_NAME}%0A%0A📦 [Download APK](${RELEASE_URL})"
        
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=Markdown"
