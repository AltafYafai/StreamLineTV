<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft Material You Shadows -->
    <filter id="md3-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#21005D" flood-opacity="0.12"/>
    </filter>
    <filter id="md3-shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#21005D" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- MD3 App Icon Base (Surface Tint) -->
  <rect width="200" height="200" rx="56" fill="#FEF7FF" />

  <!-- TV Outer Frame (Primary) -->
  <rect x="20" y="40" width="160" height="120" rx="40" fill="#6750A4" filter="url(#md3-shadow)"/>
  
  <!-- TV Inner Screen (Darker Primary for depth) -->
  <rect x="32" y="52" width="136" height="96" rx="28" fill="#4F378B" />

  <!-- The "Stream" Line (Tertiary Container / Coral Pink) -->
  <!-- Thick, organic fluid wave typical of Material You -->
  <path d="M 32 116 C 80 116 80 76 120 76 C 145 76 155 96 168 96" fill="none" stroke="#FFD8E4" stroke-width="24" stroke-linecap="round" />

  <!-- Play Button Base (Primary Container / Soft Purple) -->
  <!-- Floating Action Button (FAB) aesthetic -->
  <circle cx="100" cy="100" r="36" fill="#EADDFF" filter="url(#md3-shadow-sm)" />
  
  <!-- Play Icon (On Primary Container) -->
  <!-- Using stroke-linejoin="round" to give it perfectly soft Material 3 corners -->
  <path d="M 94 86 L 94 114 L 116 100 Z" fill="#21005D" stroke="#21005D" stroke-width="8" stroke-linejoin="round" />
</svg>